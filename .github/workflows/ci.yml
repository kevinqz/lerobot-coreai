name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: pytest

  lerobot-stable:
    # v1.2.4: STABLE target. LeRobot 0.6.0 is the blocking, certified target.
    # Pinned to the exact stable release, not the moving range.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[test,signing]"
      - run: pip install "lerobot==0.6.0"
      - run: pip install -e ./packages/lerobot_policy_coreai_bridge --no-deps
      - name: LeRobot shape certificate (strict, v0)
        run: lerobot-coreai lerobot-compat-check --strict --output-dir reports/lerobot-stable
      - name: LeRobot contract report (strict, v1 levels)
        run: lerobot-coreai lerobot-compat-check --contract --strict --output-dir reports/lerobot-stable
      - name: Bridge + compat + registry + contract + loader tests
        run: pytest tests/test_lerobot_compat.py tests/test_cli_lerobot_compat.py tests/test_lerobot_bridge.py tests/test_lerobot_registry.py tests/test_lerobot_registry_no_monkeypatch.py tests/test_lerobot_contracts.py tests/test_lerobot_stable_contract.py tests/test_source_loader_v2.py tests/test_compare_v2.py tests/test_processor_contract.py
      - name: Official out-of-tree plugin tests (lerobot installed)
        run: pytest packages/lerobot_policy_coreai_bridge/tests
      - name: Plugin compatibility profile (installed)
        run: lerobot-coreai lerobot-compat-check --plugin --output-dir reports/lerobot-stable
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lerobot-stable-compatibility-report
          path: reports/lerobot-stable

  lerobot-rollout-stable:
    # v1.3.12: dedicated MANDATORY official-rollout gate. Isolated from the compat
    # jobs because it installs LeRobot's heavy media stack (datasets/av) which the
    # dataset-import probe in the compat check must NOT see. COREAI_REQUIRE_ROLLOUT=1
    # turns a missing rollout dependency into a FAILURE (never a silent skip).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COREAI_REQUIRE_ROLLOUT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[test,signing]"
      # Install the media stack via LeRobot's own extras so pip resolves compatible
      # av/torchcodec versions (a bare `pip install av` pulls an incompatible PyAV).
      - run: pip install "lerobot[dataset,evaluation]==0.6.0"
      - run: pip install -e ./packages/lerobot_policy_coreai_bridge --no-deps
      - name: Official rollout readiness (mandatory)
        run: |
          mkdir -p reports/official-rollout-stable
          COREAI_ROLLOUT_EVIDENCE_DIR=reports/official-rollout-stable COREAI_ROLLOUT_LEROBOT_SOURCE=pypi COREAI_ROLLOUT_TARGET=stable pytest packages/lerobot_policy_coreai_bridge/tests/test_e2e_official_rollout.py -v
      - name: Verify rollout evidence offline (independent)
        run: lerobot-coreai verify-official-rollout-evidence --bundle reports/official-rollout-stable --require-complete-matrix
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: official-rollout-stable-evidence
          path: reports/official-rollout-stable

  lerobot-rollout-dev:
    # v1.3.13: rollout gate on the pinned 0.6.1-dev target. continue-on-error so a
    # DEVELOPMENT-only incompatibility doesn't block the release — but inside the
    # job the rollout may NOT skip (COREAI_REQUIRE_ROLLOUT=1), and evidence is
    # uploaded even on failure.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    env:
      COREAI_REQUIRE_ROLLOUT: "1"
      LEROBOT_DEV_REF: "e40b58a8dfa9e7b86918c374791599d070518d11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[test,signing]"
      - run: pip install "lerobot[dataset,evaluation] @ git+https://github.com/huggingface/lerobot.git@${LEROBOT_DEV_REF}"
      - run: pip install -e ./packages/lerobot_policy_coreai_bridge --no-deps
      - name: Official rollout readiness (dev, mandatory-in-job)
        run: |
          mkdir -p reports/official-rollout-dev
          COREAI_ROLLOUT_EVIDENCE_DIR=reports/official-rollout-dev COREAI_ROLLOUT_LEROBOT_SOURCE=git COREAI_ROLLOUT_TARGET=development pytest packages/lerobot_policy_coreai_bridge/tests/test_e2e_official_rollout.py -v
      - name: Verify rollout evidence offline (independent)
        run: lerobot-coreai verify-official-rollout-evidence --bundle reports/official-rollout-dev --require-complete-matrix
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: official-rollout-dev-evidence
          path: reports/official-rollout-dev

  lerobot-dev:
    # v1.2.4: DEVELOPMENT target. Post-0.6.0 LeRobot, PINNED to an exact ref
    # (never a moving @main). Non-blocking — it produces an artifact and signal
    # without gating the release. Repin LEROBOT_DEV_REF to a chosen main commit
    # once a specific post-0.6.0 commit is selected for certification.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    env:
      # Pinned exact post-0.6.0 (0.6.1-dev) commit — never a moving @main.
      LEROBOT_DEV_REF: "e40b58a8dfa9e7b86918c374791599d070518d11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[test,signing]"
      - run: pip install "git+https://github.com/huggingface/lerobot.git@${LEROBOT_DEV_REF}"
      - run: pip install -e ./packages/lerobot_policy_coreai_bridge --no-deps
      - name: LeRobot contract report (dev, v1 levels)
        run: lerobot-coreai lerobot-compat-check --contract --output-dir reports/lerobot-dev
      - name: Dev contract + plugin tests (0.6.1-dev)
        run: pytest tests/test_lerobot_dev_contract.py tests/test_lerobot_contracts.py packages/lerobot_policy_coreai_bridge/tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lerobot-dev-compatibility-report
          path: reports/lerobot-dev
