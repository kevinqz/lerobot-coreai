[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lerobot_policy_coreai_bridge"
version = "1.3.22"
description = "Official out-of-tree LeRobot policy plugin backed by Apple CoreAI (runtime-only)."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "Kevin Saltarelli" }]
keywords = ["lerobot", "coreai", "plugin", "policy", "robotics"]

# LeRobot discovers installed distributions named lerobot_policy_* and imports
# them so they self-register. This package is runtime-only: it does not train.
dependencies = [
    "lerobot>=0.6.0,<0.7.0",
    "lerobot-coreai>=1.3.22,<1.3.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/lerobot_policy_coreai_bridge"]
